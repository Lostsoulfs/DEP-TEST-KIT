# Setup once: uv tool install gitlint-core   (gitlint's `sh` dep won't build in-project on Windows)
#             uvx pre-commit install --install-hooks   (installs pre-commit + commit-msg hooks)
default_install_hook_types: [pre-commit, commit-msg]
repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff
        entry: uv run ruff check --fix
        language: system
        types: [python]
      - id: secret-gate
        name: secret/personal-data gate (added lines)
        entry: python tools/scan_staged.py --staged
        language: system
        pass_filenames: false
      - id: gitlint
        name: gitlint (conventional commits)
        entry: gitlint --staged --msg-filename
        language: system
        stages: [commit-msg]
