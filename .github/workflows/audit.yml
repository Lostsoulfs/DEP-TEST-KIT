name: Drift Audit

# Audits every PR for "drift" — divergence between what was logged (commits, PR body,
# docs/LEARNINGS.md) and what the diff actually did — using the deterministic
# tools/audit_drift.py, and posts the report as a PR comment. Report-only: no
# auto-fix push (least privilege; the auto-fix class lives in the pre-push preflight).

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: audit-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write # post the audit report comment

jobs:
  audit:
    runs-on: ubuntu-latest
    # Fork gate: GITHUB_TOKEN is read-only for fork PRs, so it can't comment.
    if: github.event.pull_request.head.repo.full_name == github.repository
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          persist-credentials: false

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv python install 3.12
      - run: uv sync --locked --all-extras

      - name: Run drift audit (report only)
        env:
          GITHUB_PR_BODY: ${{ github.event.pull_request.body }}
          GITHUB_PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_REF: ${{ github.base_ref }}
        run: uv run python tools/audit_drift.py --base "origin/${BASE_REF}" --head HEAD --run-checks

      - name: Post audit report comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: gh pr comment "$PR_NUMBER" --body-file audit-report.md
