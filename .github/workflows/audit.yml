name: Drift Audit

# Audits "drift" — divergence between what was logged (commits, PR body,
# docs/LEARNINGS.md) and what the diff actually did — via the deterministic
# tools/audit_drift.py.
#
# Design note (this environment): `main` is a protected branch (PR + required
# checks), so a job cannot push a history commit to it (the bot push is rejected:
# "protected branch hook declined"). And GITHUB_TOKEN pushes to a PR head create
# approval-HELD runs that never satisfy required checks. So this workflow NEVER
# pushes:
#   - it posts the audit report as a PR comment, and
#   - it uploads this run's one-line history record as a build ARTIFACT.
# /audit-retro aggregates the recent `audit-history-*` artifacts (see
# .claude/commands/audit-retro.md) — no committed history file, no push.

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: audit-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  audit:
    # Same-repo PRs only: GITHUB_TOKEN is read-only for forks (can't comment).
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write # post the audit report comment
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv python install 3.12
      - run: uv sync --locked --all-extras
      - name: Run drift audit (report + one history line)
        env:
          GITHUB_PR_BODY: ${{ github.event.pull_request.body }}
          GITHUB_PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          uv run python tools/audit_drift.py \
            --base "origin/${BASE_REF}" --head HEAD --run-checks \
            --history audit-history.ndjson
      - name: Upload this run's history line (aggregated by /audit-retro)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: audit-history-${{ github.run_id }}
          path: audit-history.ndjson
          retention-days: 90
      - name: Post audit report comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: gh pr comment "$PR_NUMBER" --body-file audit-report.md
