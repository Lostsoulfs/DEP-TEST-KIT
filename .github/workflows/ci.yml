name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Least privilege: read-only token unless a job needs more.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lib:
    name: Lib lane + lint + dep-prune
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv python install 3.12
      - name: Lockfile integrity (fails on drift)
        run: uv sync --locked --all-extras
      - name: Lint
        run: uv run ruff check .
      - name: Unused/missing dependency scan
        run: uv run deptry harnesses
      - name: Lib lane (no Docker) + coverage (report-only)
        run: uv run --frozen pytest -m "not integration" -q --cov=harnesses --cov-report=term-missing
      - name: Per-harness self-tests (all lib + ai harnesses)
        run: make selftest

  supply-chain:
    name: Audit + SBOM
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv python install 3.12
      - name: Vulnerability audit (OSV, fails on any CVE)
        run: uv audit --preview-features audit
      - name: Generate CycloneDX SBOM
        run: |
          uv sync --locked --all-extras
          uvx cyclonedx-py environment "$(uv python find)" --output-format json -o sbom.cdx.json
      - name: Upload SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom
          path: sbom.cdx.json
          retention-days: 14

  integration:
    name: Integration lane (Docker)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv python install 3.12
      - name: Provision locked env
        run: uv sync --locked --all-extras
      - name: Integration lane (real ephemeral services via testcontainers)
        run: uv run --frozen pytest -m integration -q

  security-scan:
    name: Secret + workflow scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Secret gate self-test
        run: python tools/scan_staged.py --self-test
      - name: Secret gate on PR diff
        if: github.event_name == 'pull_request'
        run: python tools/scan_staged.py --ci --base ${{ github.event.pull_request.base.sha }}
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - name: Workflow static analysis (zizmor)
        run: uvx zizmor .github/workflows
