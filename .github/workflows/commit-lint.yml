name: Commit Lint

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

concurrency:
  group: commit-lint-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gitlint:
    name: Conventional commits (advisory)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      # base_ref via env (not inline ${{ }}) to avoid template injection — zizmor.
      - name: Lint PR commit messages (conventional commits)
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          git fetch origin "${BASE_REF}" --depth=200
          uvx --from gitlint-core gitlint --commits "origin/${BASE_REF}..HEAD"
